# Server Configuration
server.port=8080
spring.application.name=matrix-cloud
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/matrix_cloud?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=matrix
spring.datasource.password=matrix123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis123456
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnough
jwt.expiration=86400000

# LiveKit Configuration
livekit.api.key=APIKey1
livekit.api.secret=secret12345678901234567890123456
livekit.url=ws://172.17.27.24:7880

# MinIO Configuration
minio.endpoint=http://localhost:9870
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket-name=matrix-cloud

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.com.matrix.cloud=DEBUG
logging.level.org.springframework.security=DEBUG

# ========================================
# AI / LangChain4j Configuration
# ========================================
# LLM: OpenAI-compatible API (supports DeepSeek, Alibaba Bailian, Zhipu, Moonshot, etc.)
langchain4j.open-ai.api-key=${LLM_API_KEY:sk-e1c185b4ce0c4384a87f631bf963725a}
langchain4j.open-ai.base-url=${LLM_BASE_URL:https://api.deepseek.com}
langchain4j.open-ai.model-name=${LLM_MODEL_NAME:deepseek-chat}
langchain4j.open-ai.temperature=0.3
langchain4j.open-ai.timeout=180s
langchain4j.open-ai.max-tokens=4096
langchain4j.open-ai.log-requests=true
langchain4j.open-ai.log-responses=true

# Map-Reduce chunking configuration
meeting.summary.chunk-size=2000
meeting.summary.chunk-overlap-ratio=0.15
meeting.summary.max-chunks=20

# SiliconFlow Speech-to-Text API
siliconflow.api.key=${SILICONFLOW_API_KEY:sk-fpvxyqorlftgtkupcswbeethmkeqgcbushpduxrnwcsovedc}
siliconflow.api.url=https://api.siliconflow.cn/v1/audio/transcriptions
siliconflow.model.name=FunAudioLLM/SenseVoiceSmall

# Dedicated thread pool for summary generation
meeting.summary.thread-pool.core-size=4
meeting.summary.thread-pool.max-size=8
meeting.summary.thread-pool.queue-capacity=100
meeting.summary.thread-pool.keep-alive-seconds=60
